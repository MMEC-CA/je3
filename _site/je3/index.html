<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --wall-color: #4a4a4a;
            --player-color: #f7faf9;
            --goal-color: #ebdb64;
            --path-color: #5e5757;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 4px solid var(--wall-color);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            display: block;
            background-color: var(--path-color);
        }

        #ui {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background-color: var(--player-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:hover {
            background-color: #00cc6d;
        }

        button:active {
            transform: scale(0.95);
        }

        #message {
            font-weight: bold;
            height: 24px;
        }

        #level-display {
            font-weight: bold;
            font-size: 18px;
            color: var(--player-color);
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>MAZE</h1>
    
    <div id="game-container">
        <canvas id="mazeCanvas"></canvas>
    </div>

    <div id="ui">
        <div id="level-display">Level: <span id="currentLevel">1</span></div>
        <button id="newGameBtn">Reset Game</button>
        <div id="message"></div>
    </div>

    <div class="controls-hint">
        Use Arrows or WASD to move
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const newGameBtn = document.getElementById('newGameBtn');
        const messageEl = document.getElementById('message');
        const fogToggle = document.getElementById('fogToggle');
        const levelEl = document.getElementById('currentLevel');

        let CELL_SIZE = 25;
        let GRID_WIDTH = 15; 
        let GRID_HEIGHT = 15;
        let VISION_RADIUS = CELL_SIZE * 3.5;
        let currentLevel = 1;

        canvas.width = GRID_WIDTH * CELL_SIZE;
        canvas.height = GRID_HEIGHT * CELL_SIZE;

        let grid = [];
        let player = { x: 1, y: 1 };
        let goal = { x: GRID_WIDTH - 2, y: GRID_HEIGHT - 2 };
        let isGameWon = false;

        class Cell {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.isWall = true;
                this.visited = false;
            }
        }

        function initGrid() {
            grid = [];
            for (let y = 0; y < GRID_HEIGHT; y++) {
                grid[y] = [];
                for (let x = 0; x < GRID_WIDTH; x++) {
                    grid[y][x] = new Cell(x, y);
                }
            }
        }

        function generateMaze(x, y) {
            const cell = grid[y][x];
            cell.visited = true;
            cell.isWall = false;

            const directions = [
                [0, -2], [2, 0], [0, 2], [-2, 0]
            ].sort(() => Math.random() - 0.5);

            for (const [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;

                if (nx > 0 && nx < GRID_WIDTH - 1 && ny > 0 && ny < GRID_HEIGHT - 1 && !grid[ny][nx].visited) {
                    grid[y + dy / 2][x + dx / 2].isWall = false;
                    generateMaze(nx, ny);
                }
            }
        }

        function braidMaze(chance = 0.05) {
            for (let y = 1; y < GRID_HEIGHT - 1; y++) {
                for (let x = 1; x < GRID_WIDTH - 1; x++) {
                    if (grid[y][x].isWall) {
                        const horizontal = !grid[y][x-1].isWall && !grid[y][x+1].isWall;
                        const vertical = !grid[y-1][x].isWall && !grid[y+1][x].isWall;
                        if ((horizontal || vertical) && Math.random() < chance) {
                            grid[y][x].isWall = false;
                        }
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMazeContent();
            if (fogToggle.checked && !isGameWon) {
                applyFogOfWar();
            }
        }

        function drawMazeContent() {
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    if (grid[y][x].isWall) {
                        ctx.fillStyle = 'var(--wall-color)';
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    }
                }
            }

            ctx.fillStyle = 'var(--goal-color)';
            ctx.beginPath();
            ctx.arc(
                goal.x * CELL_SIZE + CELL_SIZE / 2,
                goal.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 3, 0, Math.PI * 2
            );
            ctx.fill();

            ctx.fillStyle = 'var(--player-color)';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'var(--player-color)';
            ctx.fillRect(
                player.x * CELL_SIZE + 4,
                player.y * CELL_SIZE + 4,
                CELL_SIZE - 8,
                CELL_SIZE - 8
            );
            ctx.shadowBlur = 0;
        }

        function applyFogOfWar() {
            const px = player.x * CELL_SIZE + CELL_SIZE / 2;
            const py = player.y * CELL_SIZE + CELL_SIZE / 2;
            ctx.save();
            ctx.globalCompositeOperation = 'destination-in';
            const gradient = ctx.createRadialGradient(px, py, 0, px, py, VISION_RADIUS);
            gradient.addColorStop(0, 'rgba(0, 0, 0, 1)');
            gradient.addColorStop(0.7, 'rgba(0, 0, 0, 1)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        function movePlayer(dx, dy) {
            if (isGameWon) return;
            const nx = player.x + dx;
            const ny = player.y + dy;
            if (nx >= 0 && nx < GRID_WIDTH && ny >= 0 && ny < GRID_HEIGHT && !grid[ny][nx].isWall) {
                player.x = nx;
                player.y = ny;
                draw();
                if (player.x === goal.x && player.y === goal.y) {
                    winLevel();
                }
            }
        }

        function winLevel() {
            isGameWon = true;
            messageEl.textContent = 'LEVEL CLEAR!';
            messageEl.style.color = 'var(--player-color)';
            draw();
            setTimeout(() => {
                currentLevel++;
                startNewGame();
            }, 1500);
        }

        function startNewGame(reset = false) {
            if (reset) currentLevel = 1;
            
            levelEl.textContent = currentLevel;
            
            // Adjust difficulty based on level
            GRID_WIDTH = 15 + (currentLevel - 1) * 4;
            GRID_HEIGHT = 15 + (currentLevel - 1) * 4;
            // Cap size at 55 for performance
            if (GRID_WIDTH > 55) GRID_WIDTH = 55;
            if (GRID_HEIGHT > 55) GRID_HEIGHT = 55;
            
            CELL_SIZE = Math.max(10, 25 - Math.floor(currentLevel / 2));
            VISION_RADIUS = CELL_SIZE * (3.5 + Math.min(2, currentLevel * 0.2));

            canvas.width = GRID_WIDTH * CELL_SIZE;
            canvas.height = GRID_HEIGHT * CELL_SIZE;

            initGrid();
            generateMaze(1, 1);
            braidMaze(0.05 + Math.min(0.1, currentLevel * 0.01));
            
            player = { x: 1, y: 1 };
            goal = { x: GRID_WIDTH - 2, y: GRID_HEIGHT - 2 };
            isGameWon = false;
            messageEl.textContent = '';
            
            draw();
        }

        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': movePlayer(0, -1); break;
                case 'ArrowDown': case 's': case 'S': movePlayer(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': movePlayer(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': movePlayer(1, 0); break;
            }
        });

        newGameBtn.addEventListener('click', () => startNewGame(true));
        fogToggle.addEventListener('change', draw);

        startNewGame();
    </script>
</body>
</html>
