<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #9b1111;
            --wall-color: #1a1a1a;
            --player-color: #ff0000;
            --goal-color: #7a0000;
            --path-color: #0d0d0d;
            --font-creepy: 'Courier New', Courier, monospace;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-creepy);
            text-shadow: 0 0 5px #ff000044;
        }

        h1 {
            margin-bottom: 10px;
            letter-spacing: 5px;
            font-size: 3em;
            color: #ff0000;
            animation: flicker-text 3s infinite;
        }

        @keyframes flicker-text {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.4; }
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(255,0,0,0.1);
            border: 2px solid #330000;
            border-radius: 2px;
            overflow: hidden;
        }

        canvas {
            display: block;
            background-color: var(--path-color);
        }

        #ui {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background-color: #300;
            color: #ff0000;
            border: 1px solid #600;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            font-family: var(--font-creepy);
            border-radius: 0;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #600;
            color: #fff;
            box-shadow: 0 0 15px #ff0000;
        }

        button:active {
            transform: scale(0.95);
        }

        #message {
            font-weight: bold;
            height: 24px;
            text-shadow: 0 0 10px #ff0000;
        }

        #level-display {
            font-weight: bold;
            font-size: 18px;
            color: var(--text-color);
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 0.8em;
            color: #400;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <h1>MAZE</h1>
    
    <div id="game-container">
        <canvas id="mazeCanvas"></canvas>
    </div>

    <div id="ui">
        <div id="level-display">Level: <span id="currentLevel">1</span></div>
        <button id="newGameBtn">Reset Game</button>
        <div id="message"></div>
    </div>

    <div class="controls-hint">
        Use Arrows or WASD to move
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const newGameBtn = document.getElementById('newGameBtn');
        const messageEl = document.getElementById('message');
        const levelEl = document.getElementById('currentLevel');

        let CELL_SIZE = 25;
        let GRID_WIDTH = 15; 
        let GRID_HEIGHT = 15;
        let VISION_RADIUS = CELL_SIZE * 3.5;
        let currentLevel = 1;

        canvas.width = GRID_WIDTH * CELL_SIZE;
        canvas.height = GRID_HEIGHT * CELL_SIZE;

        let grid = [];
        let player = { x: 1, y: 1 };
        let goal = { x: GRID_WIDTH - 2, y: GRID_HEIGHT - 2 };
        let isGameWon = false;

        class Cell {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.isWall = true;
                this.visited = false;
            }
        }

        function initGrid() {
            grid = [];
            for (let y = 0; y < GRID_HEIGHT; y++) {
                grid[y] = [];
                for (let x = 0; x < GRID_WIDTH; x++) {
                    grid[y][x] = new Cell(x, y);
                }
            }
        }

        function generateMaze(x, y) {
            const cell = grid[y][x];
            cell.visited = true;
            cell.isWall = false;

            const directions = [
                [0, -2], [2, 0], [0, 2], [-2, 0]
            ].sort(() => Math.random() - 0.5);

            for (const [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;

                if (nx > 0 && nx < GRID_WIDTH - 1 && ny > 0 && ny < GRID_HEIGHT - 1 && !grid[ny][nx].visited) {
                    grid[y + dy / 2][x + dx / 2].isWall = false;
                    generateMaze(nx, ny);
                }
            }
        }

        function braidMaze(chance = 0.05) {
            for (let y = 1; y < GRID_HEIGHT - 1; y++) {
                for (let x = 1; x < GRID_WIDTH - 1; x++) {
                    if (grid[y][x].isWall) {
                        const horizontal = !grid[y][x-1].isWall && !grid[y][x+1].isWall;
                        const vertical = !grid[y-1][x].isWall && !grid[y+1][x].isWall;
                        if ((horizontal || vertical) && Math.random() < chance) {
                            grid[y][x].isWall = false;
                        }
                    }
                }
            }
        }

        let flicker = 0;
        let pulse = 0;
        let breathe = 0;

        function animate() {
            flicker = Math.random() * 15 * (Math.random() > 0.95 ? 2 : 0.2);
            pulse = (Math.sin(Date.now() / 300) + 1) / 2;
            breathe = Math.sin(Date.now() / 2000) * 5;
            draw();
            requestAnimationFrame(animate);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Random static glitch
            if (Math.random() > 0.98) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.05)';
                ctx.fillRect(Math.random() * canvas.width, 0, 2, canvas.height);
            }

            drawMazeContent();
            if (!isGameWon) {
                applyFogOfWar();
            }
        }

        function drawMazeContent() {
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    if (grid[y][x].isWall) {
                        ctx.fillStyle = 'var(--wall-color)';
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    }
                }
            }

            // Pulsing goal
            const goalColor = `rgba(122, 0, 0, ${0.5 + pulse * 0.5})`;
            ctx.fillStyle = goalColor;
            ctx.shadowBlur = 10 + pulse * 10;
            ctx.shadowColor = '#ff0000';
            ctx.beginPath();
            ctx.arc(
                goal.x * CELL_SIZE + CELL_SIZE / 2,
                goal.y * CELL_SIZE + CELL_SIZE / 2,
                (CELL_SIZE / 3) * (0.8 + pulse * 0.4), 0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // Player with blood-like trail/glow
            ctx.fillStyle = 'var(--player-color)';
            ctx.shadowBlur = 15 + flicker;
            ctx.shadowColor = 'rgba(255, 0, 0, 0.8)';
            ctx.fillRect(
                player.x * CELL_SIZE + 4,
                player.y * CELL_SIZE + 4,
                CELL_SIZE - 8,
                CELL_SIZE - 8
            );
            ctx.shadowBlur = 0;
        }

        function applyFogOfWar() {
            const px = player.x * CELL_SIZE + CELL_SIZE / 2;
            const py = player.y * CELL_SIZE + CELL_SIZE / 2;
            
            const currentVision = VISION_RADIUS - flicker + breathe;
            
            ctx.save();
            ctx.globalCompositeOperation = 'destination-in';
            const gradient = ctx.createRadialGradient(px, py, 0, px, py, currentVision);
            gradient.addColorStop(0, 'rgba(0, 0, 0, 1)');
            gradient.addColorStop(0.3, 'rgba(0, 0, 0, 0.95)');
            gradient.addColorStop(0.7, 'rgba(0, 0, 0, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            // Add a dark overlay outside vision
            ctx.save();
            ctx.globalCompositeOperation = 'destination-over';
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        const creepyMessages = [
            "STAY IN THE LIGHT",
            "IT'S WATCHING",
            "DON'T LOOK BACK",
            "THE WALLS ARE MOVING",
            "EXHAUSTED?",
            "ALONE IN THE DARK",
            "KEEP RUNNING",
            "CAN YOU HEAR IT?"
        ];

        function showCreepyMessage() {
            if (isGameWon) return;
            const msg = creepyMessages[Math.floor(Math.random() * creepyMessages.length)];
            messageEl.textContent = msg;
            messageEl.style.opacity = 1;
            setTimeout(() => {
                if (!isGameWon) messageEl.style.opacity = 0;
            }, 2000);
        }

        setInterval(showCreepyMessage, 8000);

        function movePlayer(dx, dy) {
            if (isGameWon) return;
            const nx = player.x + dx;
            const ny = player.y + dy;
            if (nx >= 0 && nx < GRID_WIDTH && ny >= 0 && ny < GRID_HEIGHT && !grid[ny][nx].isWall) {
                player.x = nx;
                player.y = ny;
                if (player.x === goal.x && player.y === goal.y) {
                    winLevel();
                }
            }
        }

        function winLevel() {
            isGameWon = true;
            messageEl.textContent = 'YOU ESCAPED... FOR NOW';
            messageEl.style.opacity = 1;
            messageEl.style.color = '#ff0000';
            setTimeout(() => {
                currentLevel++;
                startNewGame();
            }, 2000);
        }

        function startNewGame(reset = false) {
            if (reset) currentLevel = 1;
            
            levelEl.textContent = currentLevel;
            
            GRID_WIDTH = 15 + (currentLevel - 1) * 4;
            GRID_HEIGHT = 15 + (currentLevel - 1) * 4;
            if (GRID_WIDTH > 55) GRID_WIDTH = 55;
            if (GRID_HEIGHT > 55) GRID_HEIGHT = 55;
            
            CELL_SIZE = Math.max(10, 25 - Math.floor(currentLevel / 2));
            VISION_RADIUS = CELL_SIZE * (2.2 + Math.min(1.5, currentLevel * 0.15));

            canvas.width = GRID_WIDTH * CELL_SIZE;
            canvas.height = GRID_HEIGHT * CELL_SIZE;

            initGrid();
            generateMaze(1, 1);
            braidMaze(0.05 + Math.min(0.1, currentLevel * 0.01));
            
            player = { x: 1, y: 1 };
            goal = { x: GRID_WIDTH - 2, y: GRID_HEIGHT - 2 };
            isGameWon = false;
            messageEl.textContent = '';
            messageEl.style.opacity = 0;
        }

        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': movePlayer(0, -1); break;
                case 'ArrowDown': case 's': case 'S': movePlayer(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': movePlayer(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': movePlayer(1, 0); break;
            }
        });

        newGameBtn.addEventListener('click', () => startNewGame(true));

        startNewGame();
        animate();
    </script>
</body>
</html>
